# Nginx configuration for AeroDrive Platform
# Listening on port 8080, acting as a reverse proxy to isolate clients from direct backend communication.

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression for Premium Performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json;

    server {
        listen       8080;
        server_name  localhost;

        # SECURITY: Prevent revealing server information
        server_tokens off;

        # -------------------------------------------------------------
        # 1. Reverse Proxy for Backend (Django REST API)
        # -------------------------------------------------------------
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout configurations
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Django admin page proxy (if needed)
        location /admin/django/ {
            proxy_pass http://127.0.0.1:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------------------------
        # 2. Frontend Routing (React + Vite)
        # -------------------------------------------------------------
        
        # [DEVELOPMENT MODE]: Proxy to Vite's Dev Server (Supports Hot Reloads)
        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets Proxying for Vite HMR (Hot Module Replacement)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # [PRODUCTION MODE]: Serve built static files directly
        # To enable, run `npm run build` in the /frontend directory, comment out the
        # DEVELOPMENT MODE block above, and uncomment the section below:
        #
        # location / {
        #     root   c:/Users/KIIT0001/Desktop/car-rent/aerodrive-platform/frontend/dist;
        #     index  index.html index.htm;
        #     try_files $uri $uri/ /index.html;
        # }
    }
}
